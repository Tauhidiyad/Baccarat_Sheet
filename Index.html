<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat System Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #0f0f1a;
    --surface2: #141428;
    --border: #1e1e3a;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #ffaa00;
    --accent4: #00aaff;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --win: #00ff88;
    --loss: #ff3366;
    --warn: #ffaa00;
    --info: #00aaff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
  }

  .header h1 span { color: var(--accent); }

  .header-sub {
    margin-top: 8px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
  }

  /* Config panel */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
  }

  .config-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 120px;
  }

  .config-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .config-value {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .run-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .run-btn:hover { background: #00cc6a; transform: translateY(-1px); }
  .run-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent4));
    border-radius: 2px;
    transition: width 0.1s;
    width: 0%;
  }

  /* Win rate tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.08);
  }

  .tab:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* Results hidden until run */
  .results { display: none; }
  .results.visible { display: block; }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.green::before { background: var(--win); }
  .stat-card.red::before { background: var(--loss); }
  .stat-card.yellow::before { background: var(--warn); }
  .stat-card.blue::before { background: var(--info); }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-card.green .stat-value { color: var(--win); }
  .stat-card.red .stat-value { color: var(--loss); }
  .stat-card.yellow .stat-value { color: var(--warn); }
  .stat-card.blue .stat-value { color: var(--info); }

  .stat-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Chart area */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .chart-title {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  canvas {
    width: 100% !important;
    border-radius: 6px;
  }

  /* Bust analysis */
  .bust-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .bust-bars { display: flex; flex-direction: column; gap: 10px; }

  .bust-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
  }

  .bust-label { width: 80px; color: var(--muted); flex-shrink: 0; }

  .bust-bar-track {
    flex: 1;
    height: 20px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bust-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 10px;
    font-weight: 700;
    color: #000;
    white-space: nowrap;
  }

  .bust-pct { width: 50px; text-align: right; color: var(--text); flex-shrink: 0; }

  /* Verdict box */
  .verdict {
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid;
  }

  .verdict.good { border-color: var(--win); background: rgba(0,255,136,0.05); }
  .verdict.warn { border-color: var(--warn); background: rgba(255,170,0,0.05); }
  .verdict.bad { border-color: var(--loss); background: rgba(255,51,102,0.05); }

  .verdict-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .verdict.good .verdict-title { color: var(--win); }
  .verdict.warn .verdict-title { color: var(--warn); }
  .verdict.bad .verdict-title { color: var(--loss); }

  .verdict-text { font-size: 11px; color: var(--muted); line-height: 1.8; }

  /* Comparison table */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-top: 8px;
  }

  .compare-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .compare-table td {
    padding: 10px 10px;
    border-bottom: 1px solid rgba(30,30,58,0.5);
    font-family: 'Space Mono', monospace;
  }

  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: rgba(255,255,255,0.02); }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
  }

  .pill.green { background: rgba(0,255,136,0.15); color: var(--win); }
  .pill.red { background: rgba(255,51,102,0.15); color: var(--loss); }
  .pill.yellow { background: rgba(255,170,0,0.15); color: var(--warn); }

  /* Loading overlay */
  .loading {
    text-align: center;
    padding: 40px;
    display: none;
  }

  .loading.visible { display: block; }

  .loading-text {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: var(--accent);
    animation: pulse 1s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Worst run detail */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }

  .detail-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
  }

  .detail-item-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .detail-item-value { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }

  .scrollable { overflow-x: auto; }

  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-label">Monte Carlo Analysis</div>
    <h1>Baccarat <span>System</span> Simulator</h1>
    <div class="header-sub">1,000 runs × 500 cycles · Cycle-Based Recovery Strategy</div>
  </div>

  <div class="config-panel">
    <div class="config-group">
      <div class="config-label">Simulation Runs</div>
      <div class="config-value">1,000</div>
    </div>
    <div class="config-group">
      <div class="config-label">Cycles Per Run</div>
      <div class="config-value">500</div>
    </div>
    <div class="config-group">
      <div class="config-label">Starting Bankroll</div>
      <div class="config-value">100u</div>
    </div>
    <div class="config-group">
      <div class="config-label">Win Rates Tested</div>
      <div class="config-value">4</div>
    </div>
    <button class="run-btn" id="runBtn" onclick="runSimulation()">▶ RUN SIMULATION</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-text">RUNNING MONTE CARLO SIMULATION...</div>
  </div>

  <div class="results" id="results">

    <div class="tabs" id="tabs"></div>

    <div id="tabContent"></div>

    <!-- All win rates comparison -->
    <div class="bust-section" id="comparisonSection">
      <div class="section-title">All Win Rates — Side By Side</div>
      <div class="scrollable">
        <table class="compare-table" id="compareTable"></table>
      </div>
    </div>

  </div>

</div>

<script>
// ─── SIMULATION CORE ───────────────────────────────────────────────────────

function simulateOneCycle(unitSize, target, winRate) {
  let pnl = 0;
  for (let hand = 0; hand < 10; hand++) {
    const win = Math.random() < winRate;
    pnl += win ? unitSize : -unitSize;
    if (pnl >= target) return { success: true, pnl };
  }
  return { success: false, pnl };
}

function simulateOneRun(cycles, winRate, startingBankroll) {
  let bankroll = startingBankroll;
  let unitSize = 1;
  let target = 1;
  let accumulatedLoss = 0;
  let totalProfit = 0;
  let successfulCycles = 0;
  let failedCycles = 0;
  let bustedAt = null;
  let maxConsecFails = 0;
  let currentConsecFails = 0;
  let maxUnitReached = 1;
  let maxDrawdown = 0;
  let peakBankroll = startingBankroll;
  let bankrollHistory = [startingBankroll];
  let consecutiveFailStreaks = [];

  for (let c = 0; c < cycles; c++) {
    // Check if we can afford this cycle's potential max loss (10 hands × unit)
    const maxPossibleLoss = unitSize * 10;
    if (bankroll < unitSize) {
      bustedAt = c;
      break;
    }

    const result = simulateOneCycle(unitSize, target, winRate);

    if (result.success) {
      // Cycle succeeded
      bankroll += result.pnl - accumulatedLoss; // net +1 unit overall
      // Actually: net gain = cycle pnl + accumulated loss recovery
      // Simpler: bankroll changes by (result.pnl + accumulatedLoss) since accumulatedLoss is negative
      // Let's be precise:
      bankroll = bankroll - (bankroll - (bankroll + result.pnl + accumulatedLoss));
      // Re-do cleanly:
      // bankroll before this cycle already reflects prior losses paid out
      // So just add the cycle pnl (which should be +target = +|accLoss|+1)
      // Net effect: accumulatedLoss is already in bankroll, cycle nets +1
      totalProfit += 1; // always +1 unit on success
      successfulCycles++;
      accumulatedLoss = 0;
      unitSize = 1;
      target = 1;
      if (currentConsecFails > 0) {
        consecutiveFailStreaks.push(currentConsecFails);
        currentConsecFails = 0;
      }
      maxConsecFails = Math.max(maxConsecFails, 0);
    } else {
      // Cycle failed
      bankroll += result.pnl; // subtract the losses
      accumulatedLoss += result.pnl; // both negative
      failedCycles++;
      currentConsecFails++;
      maxConsecFails = Math.max(maxConsecFails, currentConsecFails);

      const newUnit = Math.abs(accumulatedLoss) + 1;
      unitSize = newUnit;
      target = newUnit;
      maxUnitReached = Math.max(maxUnitReached, newUnit);
    }

    bankrollHistory.push(Math.max(0, bankroll));
    peakBankroll = Math.max(peakBankroll, bankroll);
    const drawdown = peakBankroll - bankroll;
    maxDrawdown = Math.max(maxDrawdown, drawdown);

    if (bankroll <= 0 && bustedAt === null) {
      bustedAt = c + 1;
      break;
    }
  }

  if (currentConsecFails > 0) consecutiveFailStreaks.push(currentConsecFails);

  return {
    finalBankroll: bankroll,
    totalProfit,
    successfulCycles,
    failedCycles,
    bustedAt,
    maxConsecFails,
    maxUnitReached,
    maxDrawdown,
    bankrollHistory,
    consecutiveFailStreaks
  };
}

// ─── SIMULATION RUNNER ─────────────────────────────────────────────────────

const WIN_RATES = [
  { label: '45%', value: 0.45, color: '#ff3366' },
  { label: '50%', value: 0.50, color: '#ffaa00' },
  { label: '55%', value: 0.55, color: '#00aaff' },
  { label: '65%', value: 0.65, color: '#00ff88' },
];

const RUNS = 1000;
const CYCLES = 500;
const BANKROLL = 100;

let allResults = {};
let activeTab = 0;

async function runSimulation() {
  const btn = document.getElementById('runBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');

  btn.disabled = true;
  progressBar.style.display = 'block';
  loading.classList.add('visible');
  results.classList.remove('visible');

  await new Promise(r => setTimeout(r, 50));

  allResults = {};

  for (let wi = 0; wi < WIN_RATES.length; wi++) {
    const wr = WIN_RATES[wi];
    const runs = [];

    for (let r = 0; r < RUNS; r++) {
      runs.push(simulateOneRun(CYCLES, wr.value, BANKROLL));

      if (r % 100 === 0) {
        const pct = ((wi * RUNS + r) / (WIN_RATES.length * RUNS)) * 100;
        progressFill.style.width = pct + '%';
        await new Promise(r2 => setTimeout(r2, 0));
      }
    }

    allResults[wr.label] = { wr, runs };
  }

  progressFill.style.width = '100%';
  await new Promise(r => setTimeout(r, 200));

  loading.classList.remove('visible');
  progressBar.style.display = 'none';
  btn.disabled = false;
  btn.textContent = '↺ RE-RUN';

  results.classList.add('visible');
  renderResults();
}

// ─── STATS CALCULATOR ──────────────────────────────────────────────────────

function calcStats(runs) {
  const n = runs.length;
  const bustedRuns = runs.filter(r => r.bustedAt !== null);
  const survivingRuns = runs.filter(r => r.bustedAt === null);

  const bustRate = bustedRuns.length / n;
  const avgFinalBankroll = runs.reduce((s, r) => s + Math.max(0, r.finalBankroll), 0) / n;
  const avgProfit = survivingRuns.length > 0
    ? survivingRuns.reduce((s, r) => s + r.totalProfit, 0) / survivingRuns.length
    : 0;

  const avgMaxUnit = runs.reduce((s, r) => s + r.maxUnitReached, 0) / n;
  const maxMaxUnit = Math.max(...runs.map(r => r.maxUnitReached));

  const avgMaxConsecFails = runs.reduce((s, r) => s + r.maxConsecFails, 0) / n;
  const maxMaxConsecFails = Math.max(...runs.map(r => r.maxConsecFails));

  const avgMaxDrawdown = runs.reduce((s, r) => s + r.maxDrawdown, 0) / n;

  const bustAtCycles = bustedRuns.map(r => r.bustedAt);
  const avgBustCycle = bustedRuns.length > 0
    ? bustAtCycles.reduce((a, b) => a + b, 0) / bustedRuns.length
    : null;

  // Median final bankroll
  const sorted = [...runs].map(r => Math.max(0, r.finalBankroll)).sort((a, b) => a - b);
  const medianBankroll = sorted[Math.floor(n / 2)];

  // Bust by cycle buckets
  const bustBuckets = { '0-50': 0, '51-100': 0, '101-200': 0, '201-500': 0 };
  bustedRuns.forEach(r => {
    const c = r.bustedAt;
    if (c <= 50) bustBuckets['0-50']++;
    else if (c <= 100) bustBuckets['51-100']++;
    else if (c <= 200) bustBuckets['101-200']++;
    else bustBuckets['201-500']++;
  });

  // Average bankroll trajectory (sample 50 points)
  const trajectoryPoints = 50;
  const trajectory = Array(trajectoryPoints).fill(0);
  const counts = Array(trajectoryPoints).fill(0);
  runs.forEach(run => {
    const hist = run.bankrollHistory;
    for (let i = 0; i < trajectoryPoints; i++) {
      const idx = Math.floor((i / trajectoryPoints) * hist.length);
      if (hist[idx] !== undefined) {
        trajectory[i] += hist[idx];
        counts[i]++;
      }
    }
  });
  const avgTrajectory = trajectory.map((v, i) => counts[i] > 0 ? v / counts[i] : 0);

  return {
    bustRate, avgFinalBankroll, medianBankroll, avgProfit,
    avgMaxUnit, maxMaxUnit, avgMaxConsecFails, maxMaxConsecFails,
    avgMaxDrawdown, avgBustCycle, bustBuckets, avgTrajectory,
    bustedCount: bustedRuns.length, survivingCount: survivingRuns.length
  };
}

// ─── RENDER ────────────────────────────────────────────────────────────────

function renderResults() {
  renderTabs();
  renderTab(activeTab);
  renderComparison();
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = WIN_RATES.map((wr, i) => `
    <div class="tab ${i === activeTab ? 'active' : ''}" onclick="switchTab(${i})" style="${i === activeTab ? `border-color:${wr.color};color:${wr.color};background:${wr.color}15` : ''}">
      WIN RATE ${wr.label}
    </div>
  `).join('');
}

function switchTab(i) {
  activeTab = i;
  renderTabs();
  renderTab(i);
}

function renderTab(i) {
  const wr = WIN_RATES[i];
  const { runs } = allResults[wr.label];
  const s = calcStats(runs);
  const color = wr.color;

  const bustPct = (s.bustRate * 100).toFixed(1);
  const survivePct = (100 - s.bustRate * 100).toFixed(1);

  let verdictClass = 'good';
  let verdictTitle = '✅ PROFITABLE — LOW RISK';
  let verdictText = `At ${wr.label} win rate, this system performs well over 500 cycles. Bust rate is low and surviving runs grow the bankroll meaningfully.`;

  if (s.bustRate > 0.5) {
    verdictClass = 'bad';
    verdictTitle = '❌ HIGH DANGER — LIKELY BUST';
    verdictText = `At ${wr.label} win rate, more than half of all simulation runs go bust before completing 500 cycles. The escalating unit size overwhelms the bankroll under sustained losing pressure.`;
  } else if (s.bustRate > 0.15) {
    verdictClass = 'warn';
    verdictTitle = '⚠️ CAUTION — MODERATE RISK';
    verdictText = `At ${wr.label} win rate, roughly ${bustPct}% of runs bust out. The system works in most runs but carries meaningful risk over a long session.`;
  }

  const html = `
    <div class="verdict ${verdictClass}">
      <div class="verdict-title">${verdictTitle}</div>
      <div class="verdict-text">${verdictText}</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card ${s.bustRate > 0.3 ? 'red' : s.bustRate > 0.1 ? 'yellow' : 'green'}">
        <div class="stat-label">Bust Rate</div>
        <div class="stat-value">${bustPct}%</div>
        <div class="stat-sub">${s.bustedCount} of ${RUNS} runs</div>
      </div>
      <div class="stat-card ${s.bustRate < 0.1 ? 'green' : 'blue'}">
        <div class="stat-label">Survival Rate</div>
        <div class="stat-value">${survivePct}%</div>
        <div class="stat-sub">${s.survivingCount} of ${RUNS} runs</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Avg Final Bankroll</div>
        <div class="stat-value">${s.avgFinalBankroll.toFixed(1)}u</div>
        <div class="stat-sub">median: ${s.medianBankroll.toFixed(1)}u</div>
      </div>
      <div class="stat-card ${s.avgProfit > 50 ? 'green' : 'yellow'}">
        <div class="stat-label">Avg Profit (survivors)</div>
        <div class="stat-value">+${s.avgProfit.toFixed(0)}u</div>
        <div class="stat-sub">over 500 cycles</div>
      </div>
      <div class="stat-card ${s.maxMaxUnit > 200 ? 'red' : s.maxMaxUnit > 50 ? 'yellow' : 'green'}">
        <div class="stat-label">Max Unit Seen</div>
        <div class="stat-value">${s.maxMaxUnit}×</div>
        <div class="stat-sub">avg: ${s.avgMaxUnit.toFixed(1)}×</div>
      </div>
      <div class="stat-card ${s.maxMaxConsecFails >= 5 ? 'red' : s.maxMaxConsecFails >= 3 ? 'yellow' : 'green'}">
        <div class="stat-label">Max Consec. Fails</div>
        <div class="stat-value">${s.maxMaxConsecFails}</div>
        <div class="stat-sub">avg: ${s.avgMaxConsecFails.toFixed(1)}</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Avg Max Drawdown</div>
        <div class="stat-value">${s.avgMaxDrawdown.toFixed(1)}u</div>
        <div class="stat-sub">of 100u start</div>
      </div>
      ${s.avgBustCycle ? `
      <div class="stat-card yellow">
        <div class="stat-label">Avg Bust At Cycle</div>
        <div class="stat-value">${s.avgBustCycle.toFixed(0)}</div>
        <div class="stat-sub">of 500 cycles</div>
      </div>` : `
      <div class="stat-card green">
        <div class="stat-label">Avg Bust At Cycle</div>
        <div class="stat-value">N/A</div>
        <div class="stat-sub">rarely busts</div>
      </div>`}
    </div>

    <div class="chart-section">
      <div class="chart-title">Average Bankroll Trajectory · ${wr.label} Win Rate</div>
      <canvas id="trajectoryChart${i}" height="200"></canvas>
    </div>

    <div class="bust-section">
      <div class="section-title">When Busts Happen</div>
      <div class="bust-bars">
        ${Object.entries(s.bustBuckets).map(([range, count]) => {
          const pct = RUNS > 0 ? (count / RUNS * 100) : 0;
          const barColor = range === '0-50' ? '#ff3366' : range === '51-100' ? '#ff6633' : range === '101-200' ? '#ffaa00' : '#00aaff';
          return `
          <div class="bust-row">
            <div class="bust-label">Cycle ${range}</div>
            <div class="bust-bar-track">
              <div class="bust-bar-fill" style="width:${Math.min(pct * 3, 100)}%;background:${barColor}">
                ${pct > 2 ? count + ' runs' : ''}
              </div>
            </div>
            <div class="bust-pct">${pct.toFixed(1)}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;

  document.getElementById('tabContent').innerHTML = html;

  // Draw trajectory chart
  drawTrajectoryChart(`trajectoryChart${i}`, s.avgTrajectory, color, wr.label);
}

function drawTrajectoryChart(canvasId, data, color, label) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = canvas.offsetWidth || 600;
  const h = 200;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const chartW = w - pad.left - pad.right;
  const chartH = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  const minVal = Math.min(...data, 0);
  const maxVal = Math.max(...data, 100);
  const range = maxVal - minVal || 1;

  const xScale = i => pad.left + (i / (data.length - 1)) * chartW;
  const yScale = v => pad.top + chartH - ((v - minVal) / range) * chartH;

  // Grid lines
  ctx.strokeStyle = 'rgba(30,30,58,0.8)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * chartH;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + chartW, y);
    ctx.stroke();
    const val = maxVal - (i / 4) * range;
    ctx.fillStyle = 'rgba(90,90,122,0.8)';
    ctx.font = '9px Space Mono';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(0) + 'u', pad.left - 4, y + 3);
  }

  // Starting line at 100u
  const y100 = yScale(100);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, y100);
  ctx.lineTo(pad.left + chartW, y100);
  ctx.stroke();
  ctx.setLineDash([]);

  // Area fill
  const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
  gradient.addColorStop(0, color + '30');
  gradient.addColorStop(1, color + '05');

  ctx.beginPath();
  ctx.moveTo(xScale(0), yScale(data[0]));
  data.forEach((v, i) => { if (i > 0) ctx.lineTo(xScale(i), yScale(v)); });
  ctx.lineTo(xScale(data.length - 1), pad.top + chartH);
  ctx.lineTo(xScale(0), pad.top + chartH);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xScale(0), yScale(data[0]));
  data.forEach((v, i) => { if (i > 0) ctx.lineTo(xScale(i), yScale(v)); });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // X axis labels
  ctx.fillStyle = 'rgba(90,90,122,0.8)';
  ctx.font = '9px Space Mono';
  ctx.textAlign = 'center';
  [0, 0.25, 0.5, 0.75, 1].forEach(t => {
    const x = pad.left + t * chartW;
    const cycle = Math.round(t * CYCLES);
    ctx.fillText('C' + cycle, x, h - 8);
  });
}

function renderComparison() {
  const table = document.getElementById('compareTable');
  const stats = WIN_RATES.map(wr => ({
    wr,
    s: calcStats(allResults[wr.label].runs)
  }));

  table.innerHTML = `
    <thead>
      <tr>
        <th>Win Rate</th>
        <th>Bust Rate</th>
        <th>Avg Bankroll</th>
        <th>Avg Profit*</th>
        <th>Max Unit</th>
        <th>Max Consec Fails</th>
        <th>Verdict</th>
      </tr>
    </thead>
    <tbody>
      ${stats.map(({ wr, s }) => {
        const bustPct = (s.bustRate * 100).toFixed(1);
        const pillClass = s.bustRate > 0.3 ? 'red' : s.bustRate > 0.1 ? 'yellow' : 'green';
        const verdict = s.bustRate > 0.5 ? 'DANGER' : s.bustRate > 0.15 ? 'CAUTION' : 'SAFE';
        const vClass = s.bustRate > 0.5 ? 'red' : s.bustRate > 0.15 ? 'yellow' : 'green';
        return `
        <tr>
          <td style="color:${wr.color};font-weight:700">${wr.label}</td>
          <td><span class="pill ${pillClass}">${bustPct}%</span></td>
          <td>${s.avgFinalBankroll.toFixed(1)}u</td>
          <td>+${s.avgProfit.toFixed(0)}u</td>
          <td style="color:${s.maxMaxUnit > 200 ? 'var(--loss)' : s.maxMaxUnit > 50 ? 'var(--warn)' : 'var(--win)'}">
            ${s.maxMaxUnit}×
          </td>
          <td style="color:${s.maxMaxConsecFails >= 5 ? 'var(--loss)' : s.maxMaxConsecFails >= 3 ? 'var(--warn)' : 'var(--win)'}">
            ${s.maxMaxConsecFails}
          </td>
          <td><span class="pill ${vClass}">${verdict}</span></td>
        </tr>`;
      }).join('')}
    </tbody>
    <tfoot>
      <tr>
        <td colspan="7" style="color:var(--muted);font-size:9px;padding-top:12px">
          * Avg profit calculated from surviving runs only · Bankroll = 100 units · 1,000 runs × 500 cycles
        </td>
      </tr>
    </tfoot>
  `;
}
