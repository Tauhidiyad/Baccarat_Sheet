<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat Record Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-bright: #e8c96a;
    --gold-dim: #6b5020;
    --gold-glow: rgba(201,168,76,0.14);
    --bg: #0b0b0b;
    --surface: #111111;
    --cream: #f0e6cc;
    --cream-dim: #a89070;
    --win: #4db87a;
    --loss: #c0392b;
    --border: rgba(201,168,76,0.2);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 16px 80px;
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--cream);
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.7s ease both; }
  .header-spades { font-size: 1.2rem; color: var(--gold); letter-spacing: 0.5em; margin-bottom: 8px; text-shadow: 0 0 20px rgba(201,168,76,0.4); }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3rem);
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-shadow: 0 0 60px rgba(201,168,76,0.3), 0 2px 0 rgba(0,0,0,0.8);
    line-height: 1;
  }
  .header-rule { display: flex; align-items: center; gap: 10px; margin: 12px auto 0; width: 200px; }
  .hr-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
  .hr-line.r { background: linear-gradient(90deg, var(--gold-dim), transparent); }
  .hr-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

  /* STATS BAR */
  .stats-bar {
    width: 100%;
    max-width: 680px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 14px;
    background: var(--surface);
    overflow: hidden;
    animation: fadeUp 0.7s ease 0.1s both;
  }
  .stat-cell { padding: 13px 8px; text-align: center; border-right: 1px solid var(--border); }
  .stat-cell:last-child { border-right: none; }
  .stat-label { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cream-dim); margin-bottom: 4px; }
  .stat-value { font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 700; color: var(--gold); }
  .stat-value.sv-win  { color: var(--win); }
  .stat-value.sv-loss { color: var(--loss); }
  .stat-value.sv-pos  { color: var(--win); }
  .stat-value.sv-neg  { color: var(--loss); }

  /* CARD */
  .card {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    overflow: hidden;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  thead tr {
    background: linear-gradient(180deg, rgba(201,168,76,0.13) 0%, rgba(201,168,76,0.04) 100%);
    border-bottom: 1px solid var(--gold-dim);
  }
  th {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 13px 10px;
    text-align: center;
  }
  tbody tr { border-bottom: 1px solid rgba(201,168,76,0.07); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(201,168,76,0.03); }

  /* Cycle separator */
  tbody tr.cycle-start { border-top: 1px solid rgba(201,168,76,0.45); }
  tbody tr.cycle-start td { padding-top: 12px; }

  /* Session end row */
  tbody tr.session-end { opacity: 0.45; }

  td { padding: 9px 10px; text-align: center; vertical-align: middle; }

  .row-num { font-family: 'Cinzel', serif; font-size: 0.78rem; color: var(--gold-dim); }
  .row-num.active { color: var(--gold); }

  /* Inputs */
  input[type="number"], select {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.14);
    border-radius: 2px;
    color: var(--cream);
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    padding: 6px 6px;
    width: 100%;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input[type="number"]:focus, select:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
  input[type="number"]::placeholder { color: rgba(201,168,76,0.2); font-style: italic; }
  input[type="number"]:disabled, select:disabled { opacity: 0.3; cursor: not-allowed; }
  select option { background: #111; color: var(--cream); }
  .sel-win  { color: var(--win) !important; }
  .sel-loss { color: var(--loss) !important; }

  /* P&L cell */
  .pnl-cell { font-family: 'Cinzel', serif; font-size: 0.8rem; }
  .pnl-pos  { color: var(--win); }
  .pnl-neg  { color: var(--loss); }
  .pnl-zero { color: var(--cream-dim); }
  .reset-tag { display: block; font-size: 0.48rem; letter-spacing: 0.12em; color: var(--gold-dim); text-transform: uppercase; margin-top: 2px; }

  /* Session ended banner */
  .session-banner {
    display: none;
    background: rgba(192,57,43,0.08);
    border-top: 1px solid rgba(192,57,43,0.3);
    padding: 12px 18px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #e57373;
  }
  .session-banner.show { display: block; }

  /* FOOTER */
  .footer-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 18px;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid var(--gold-dim);
    flex-wrap: wrap;
    gap: 10px;
  }
  .cycle-info { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--cream-dim); text-transform: uppercase; }
  .cycle-info span { color: var(--gold); }
  .btn-new {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    padding: 9px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-new:hover { background: var(--gold-glow); border-color: var(--gold); }
  .btn-new:active { transform: scale(0.97); }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 100; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .modal { background: #0e0e0e; border: 1px solid var(--gold-dim); border-radius: 3px; padding: 36px 40px; text-align: center; max-width: 300px; box-shadow: 0 20px 80px rgba(0,0,0,0.9); animation: fadeUp 0.2s ease; }
  .modal h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.9rem; letter-spacing: 0.12em; margin-bottom: 10px; }
  .modal p { color: var(--cream-dim); font-size: 0.9rem; font-style: italic; margin-bottom: 24px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .btn-confirm { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 9px 20px; border-radius: 2px; cursor: pointer; transition: all 0.2s; border: 1px solid; }
  .btn-confirm.danger { background: rgba(192,57,43,0.12); border-color: #c0392b; color: #e57373; }
  .btn-confirm.danger:hover { background: rgba(192,57,43,0.28); }
  .btn-confirm.cancel { background: transparent; border-color: var(--gold-dim); color: var(--cream-dim); }
  .btn-confirm.cancel:hover { background: var(--gold-glow); }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(14px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes rowSlide { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }

  .col-num  { width: 52px; }
  .col-unit { width: 110px; }
  .col-bet  { width: 140px; }
  .col-res  { width: 140px; }
  .col-pnl  { width: 100px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-spades">♠ ♦ ♣ ♥</div>
  <h1>BACCARAT</h1>
  <div class="header-rule">
    <div class="hr-line"></div><div class="hr-diamond"></div><div class="hr-line r"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-cell">
    <div class="stat-label">Rounds</div>
    <div class="stat-value" id="s-rounds">0</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Wins</div>
    <div class="stat-value sv-win" id="s-wins">0</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Losses</div>
    <div class="stat-value sv-loss" id="s-losses">0</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Net Units</div>
    <div class="stat-value" id="s-net">0</div>
  </div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th class="col-num">#</th>
        <th class="col-unit">Unit Size</th>
        <th class="col-bet">Bet</th>
        <th class="col-res">Result</th>
        <th class="col-pnl">P&amp;L</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="session-banner" id="session-banner">⬛ Session Over — 10 Bets Reached Without Profit</div>
  <div class="footer-bar">
    <div class="cycle-info">Cycle <span id="s-cycle">1</span> &nbsp;·&nbsp; Bet <span id="s-rownum">—</span> / 10</div>
    <button class="btn-new" onclick="askClear()">⟳ &nbsp;New Record</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Clear All Data?</h2>
    <p>This resets the sheet for a new session and cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-confirm cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm danger" onclick="clearSheet()">Clear</button>
    </div>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  // Each entry: { unit, bet, result }
  // Rows are rendered dynamically based on state

  const MAX_CYCLE_ROWS = 10;
  const tbody = document.getElementById('tbody');

  // state = array of cycles; each cycle = array of rows (up to 10)
  // A new cycle starts when previous cycle hits +1 net
  // state[c][r] = { unit:'', bet:'', res:'' }

  let state = []; // array of cycles
  let sessionEnded = false;

  function newCycle() {
    return [{ unit: '', bet: '', res: '' }]; // start with 1 empty row
  }

  function init() {
    state = [newCycle()];
    sessionEnded = false;
    render();
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    tbody.innerHTML = '';

    let globalWins = 0, globalLosses = 0, globalRounds = 0, globalNet = 0;
    let currentCycle = state.length;
    let currentCycleRow = 0;

    state.forEach((cycle, ci) => {
      let cyclePnl = 0;

      cycle.forEach((row, ri) => {
        const rowIndex = `${ci}-${ri}`;
        const isCycleStart = ci > 0 && ri === 0;
        const isLastCycle = ci === state.length - 1;
        const isLastRow   = ri === cycle.length - 1;

        const tr = document.createElement('tr');
        tr.id = `tr-${rowIndex}`;
        if (isCycleStart) tr.classList.add('cycle-start');

        // Determine if this row is filled
        const filled = row.unit !== '' && row.bet !== '' && row.res !== '';
        let rowPnl = 0;

        if (filled) {
          globalRounds++;
          rowPnl = row.res === 'Win' ? parseFloat(row.unit) : -parseFloat(row.unit);
          if (row.res === 'Win') globalWins++; else globalLosses++;
          cyclePnl  = +(cyclePnl + rowPnl).toFixed(2);
          globalNet = +(globalNet + rowPnl).toFixed(2);
          if (isLastCycle) currentCycleRow = ri + 1;
        }

        // Disable row if session ended and it's after the 10th in last cycle
        const isDisabled = sessionEnded && isLastCycle && ri >= MAX_CYCLE_ROWS;

        // P&L display
        let pnlHtml = '—';
        if (filled) {
          const sign = cyclePnl >= 0 ? '+' : '';
          const cls  = cyclePnl > 0 ? 'pnl-pos' : cyclePnl < 0 ? 'pnl-neg' : 'pnl-zero';
          // Show cycle reset tag if this row triggered it
          const isReset = cyclePnl >= 1 && isLastRow && !isLastCycle;
          const tag = isReset ? `<span class="reset-tag">↺ cycle ${ci + 2}</span>` : '';
          pnlHtml = `<span class="${cls}">${sign}${cyclePnl}</span>${tag}`;
        }

        // Row number within cycle
        const displayNum = filled ? String(ri + 1).padStart(2, '0') : '—';
        const numCls = filled ? 'row-num active' : 'row-num';

        tr.innerHTML = `
          <td><span class="${numCls}">${displayNum}</span></td>
          <td><input type="number" id="unit-${rowIndex}" min="0" step="any" placeholder="0"
            value="${row.unit}" ${isDisabled ? 'disabled' : ''}
            oninput="onInput('${rowIndex}','unit',this.value)" /></td>
          <td>
            <select id="bet-${rowIndex}" ${isDisabled ? 'disabled' : ''}
              onchange="onInput('${rowIndex}','bet',this.value)">
              <option value="" ${row.bet===''?'selected':''}>— Select —</option>
              <option value="Player" ${row.bet==='Player'?'selected':''}>Player</option>
              <option value="Banker" ${row.bet==='Banker'?'selected':''}>Banker</option>
            </select>
          </td>
          <td>
            <select id="res-${rowIndex}" ${isDisabled ? 'disabled' : ''}
              onchange="onInput('${rowIndex}','res',this.value)">
              <option value="" ${row.res===''?'selected':''}>— Select —</option>
              <option value="Win" ${row.res==='Win'?'selected':''}>Win</option>
              <option value="Loss" ${row.res==='Loss'?'selected':''}>Loss</option>
            </select>
          </td>
          <td class="pnl-cell">${pnlHtml}</td>
        `;

        tbody.appendChild(tr);

        // Colour result selects
        const resEl = document.getElementById(`res-${rowIndex}`);
        if (resEl) {
          resEl.classList.remove('sel-win','sel-loss');
          if (row.res === 'Win')  resEl.classList.add('sel-win');
          if (row.res === 'Loss') resEl.classList.add('sel-loss');
        }
      });
    });

    // Stats
    document.getElementById('s-rounds').textContent = globalRounds;
    document.getElementById('s-wins').textContent   = globalWins;
    document.getElementById('s-losses').textContent = globalLosses;
    document.getElementById('s-cycle').textContent  = state.length;
    document.getElementById('s-rownum').textContent = currentCycleRow || '—';

    const netEl = document.getElementById('s-net');
    netEl.textContent = (globalNet >= 0 ? '+' : '') + globalNet;
    netEl.className = 'stat-value ' +
      (globalNet > 0 ? 'sv-pos' : globalNet < 0 ? 'sv-neg' : '');

    // Session banner
    document.getElementById('session-banner').classList.toggle('show', sessionEnded);
  }

  // ── Input handler ─────────────────────────────────────────────────────────
  function onInput(rowIndex, field, value) {
    const [ci, ri] = rowIndex.split('-').map(Number);
    state[ci][ri][field] = value;

    // After updating, check if row is complete
    checkAndExpand(ci, ri);
    render();
  }

  function checkAndExpand(ci, ri) {
    const cycle = state[ci];
    const row   = cycle[ri];
    const isLastCycle = ci === state.length - 1;

    if (!isLastCycle) return; // only act on current cycle

    const filled = row.unit !== '' && row.bet !== '' && row.res !== '';
    if (!filled) return;

    const unit   = parseFloat(row.unit);
    const rowPnl = row.res === 'Win' ? unit : -unit;

    // Recalc cycle pnl up to this row
    let cyclePnl = 0;
    for (let r = 0; r <= ri; r++) {
      const rr = cycle[r];
      if (rr.unit !== '' && rr.bet !== '' && rr.res !== '') {
        const u = parseFloat(rr.unit);
        cyclePnl = +(cyclePnl + (rr.res === 'Win' ? u : -u)).toFixed(2);
      }
    }

    if (cyclePnl >= 1) {
      // Profit hit — start new cycle
      state.push(newCycle());
      sessionEnded = false;
    } else if (ri + 1 >= MAX_CYCLE_ROWS) {
      // Hit 10 rows without profit — session over
      sessionEnded = true;
    } else {
      // Add next row if it doesn't exist
      if (ri + 1 >= cycle.length) {
        cycle.push({ unit: '', bet: '', res: '' });
      }
    }
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  function askClear() { document.getElementById('overlay').classList.add('show'); }
  function closeModal() { document.getElementById('overlay').classList.remove('show'); }
  function clearSheet() { closeModal(); init(); }

  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  init();
</script>
</body>
</html>
